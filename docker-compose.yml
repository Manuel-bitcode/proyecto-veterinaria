services:
  postgres:
    image: postgres:16-alpine
    container_name: sigsc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigsc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sigsc_pgdata:/var/lib/postgresql/data
volumes:
  sigsc_pgdata:
